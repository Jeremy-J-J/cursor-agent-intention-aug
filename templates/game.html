<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Guessing Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .game-info {
            text-align: center;
            margin: 20px 0;
        }
        .word-display {
            font-size: 2em;
            text-align: center;
            margin: 30px 0;
            letter-spacing: 5px;
        }
        .guessed-letters {
            text-align: center;
            margin: 20px 0;
        }
        .attempts {
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
        }
        .form-group {
            text-align: center;
            margin: 20px 0;
        }
        input[type="text"] {
            width: 50px;
            height: 50px;
            font-size: 1.5em;
            text-align: center;
            border: 2px solid #333;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.1em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .message {
            text-align: center;
            font-size: 1.2em;
            margin: 20px 0;
            font-weight: bold;
        }
        .win {
            color: green;
        }
        .lose {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Word Guessing Game</h1>
        <p style="text-align: center;">Guess the word letter by letter!</p>
        
        <div class="game-info">
            <p>Attempts left: <span id="attempts">{{ attempts_left }}</span></p>
        </div>
        
        <div class="word-display">
            {{ word }}
        </div>
        
        <div class="guessed-letters">
            Guessed letters: {{ guessed_letters }}
        </div>
        
        {% if game_status == 'won' %}
        <div class="message win">Congratulations! You won!</div>
        {% elif game_status == 'lost' %}
        <div class="message lose">Game Over! The word was: {{ word.replace(' ', '') }}</div>
        {% endif %}
        
        <div class="form-group">
            <form method="POST" action="{{ url_for('guess') }}">
                <input type="text" name="letter" maxlength="1" required>
                <button type="submit">Guess</button>
            </form>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('new_game') }}"><button>New Game</button></a>
        </div>
    </div>
</body>
</html>
